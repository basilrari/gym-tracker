<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your signup - Gym Tracker</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 24px; }
    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 24px; font-weight: bold; color: #22c55e; }
    .card { background: #f8fafc; border-radius: 12px; padding: 24px; margin: 24px 0; }
    .button { display: inline-block; background: #22c55e; color: white !important; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; margin: 16px 0; }
    .footer { font-size: 12px; color: #64748b; margin-top: 32px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Gym Tracker</div>
  </div>
  <div class="card">
    <h2 style="margin-top: 0;">Confirm your email</h2>
    <p>Thanks for signing up! Click the button below to verify your email and get started.</p>
    <p><a href="{{ .ConfirmationURL }}" class="button">Confirm email</a></p>
    <p style="font-size: 14px; color: #64748b;">Or copy and paste this link into your browser:</p>
    <p style="font-size: 12px; word-break: break-all;">{{ .ConfirmationURL }}</p>
  </div>
  <div class="footer">
    <p>If you didn't create an account, you can safely ignore this email.</p>
    <p>&copy; Gym Tracker</p>
  </div>
</body>
</html>
